name: Sincronización y Balanceo Diario de Stock

on:
  schedule:
    # Se ejecuta de forma automática todos los días a las 05:00 AM UTC (02:00 AM de Argentina)
    - cron: '0 5 * * *'
  workflow_dispatch: # Esto habilita un botón en la interfaz de GitHub para correrlo manualmente cuando quieras

jobs:
  ejecutar-balanceo:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Optimiza la velocidad de instalación si usás package-lock.json

      - name: 📦 Instalar dependencias
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install axios
          fi

      - name: 🚀 Ejecutar script de balanceo de stock
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
        run: node sync_stock.js