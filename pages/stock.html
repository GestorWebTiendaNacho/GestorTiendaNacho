---
layout: default
---
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/cssStock.css">
<div class="main-sync-container">
      <div class="flex flex-wrap justify-center py-6 gap-16 items-center mt-8">
        <button onclick="window.iniciarProceso()" id="btn-sync" class="btn-lex-minimal">
            <i class="bi bi-arrow-repeat"></i><span id="btn-text">EJECUTAR SINCRONIZACIÓN</span>
        </button>

        <button onclick="window.ejecutarProtocoloRescate()" id="btn-panic" class="btn-panic-shield">
            <i class="bi bi-shield-fill-exclamation"></i> <span>DESCARGAR BASE DE DATOS</span>
        </button>

        <button id="btn-backup-emergencia" onclick="crearBackupCSV()" class="btn-masive-stock">
            <i class="bi bi-database-down"></i>
            <span class="relative text-white">DESCARGAR STOCK MASIVO</span>
        </button>
      </div>
      
          <main class="sync-grid">
              <div class="card-glass-CB">
                  <h3 class="label-gauge">CONTABILIUM API</h3>
                  <div class="canvas-wrapper">
                      <div id="placeholder_cb" class="logo-placeholder">
                          <div class="icon-circle circle-cb">
                            <img src="https://lh3.googleusercontent.com/u/0/d/1yzOmjbU3Q0NdD_WS7TDDGLl3tpGvR8uK" alt="Contabilium" class="logo-plataforma-sync">
                          </div>
                      </div>
                      <canvas id="cvs_descarga" width="280" height="280"></canvas>
                  </div>
              </div>
              
              <div class="card-glass-TN">
                  <h3 class="label-gauge">TIENDANUBE SYNC</h3>
                  <div class="canvas-wrapper">
                    <div id="placeholder_tn" class="logo-placeholder">
                        <div class="icon-circle circle-tn">
                            <img src="https://lh3.googleusercontent.com/u/0/d/12-J3OP1M1ZpR-yHdwJ0l63WFakaFU_M2" alt="Tienda Nube" class="logo-plataforma-sync">
                        </div>
                    </div>
                      <canvas id="cvs_impacto" width="280" height="280"></canvas>
                  </div>
              </div>
          </main>

<section class="stats-grid">
    <div class="stat-mini-card s-blue">
        <p>PROCESADOS</p>
        <span id="txt-procesados">0</span> <div class="neon-line"></div>
    </div>
    <div class="stat-mini-card s-gold">
        <p>TIEMPO</p>
        <span id="txt-time-real">00:00:00</span> <div class="neon-line"></div>
    </div>
    <div class="stat-mini-card s-red">
        <p>FALTANTES</p>
        <span id="txt-faltantes">0</span> <div class="neon-line"></div>
    </div>
</section>

    <div class="log-frame-premium">
        <div id="log-container" class="terminal-style">
            <div class="text-slate-500 italic"># SISTEMA LISTO... ESPERANDO INSTRUCCIONES...</div>
        </div>
    </div>
</div>

<div id="modal-report" class="fixed inset-0 hidden items-center justify-center z-[10000] bg-slate-950/80 backdrop-blur-xl">
    <div class="p-10 max-w-sm w-full border border-gold/20 rounded-[40px] bg-slate-900 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <div class="w-16 h-1 w-1/3 bg-gold/30 mx-auto mb-6 rounded-full"></div>
        <h2 class="text-xl font-bold text-white mb-8 text-center tracking-tight">SINCRONIZACIÓN COMPLETADA</h2>
        
        <div class="space-y-6 mb-10">
            <div class="flex flex-col items-center">
                <span class="text-slate-500 text-[10px] tracking-widest uppercase mb-1">Registros Actualizados Totales</span>
                <span id="mdl-desc" class="text-3xl font-light text-white">0</span>
            </div>
            <div class="grid grid-cols-2 gap-4 pt-6 border-t border-slate-800">
                <div class="text-center">
                    <span class="block text-slate-500 text-[9px] uppercase">Sincronizados</span>
                    <span id="mdl-proc" class="text-emerald-400 font-bold">0</span>
                </div>
                <div class="text-center">
                    <span class="block text-slate-500 text-[9px] uppercase">Actualizados</span>
                    <span id="mdl-ign" class="text-red-500 font-bold">0</span>
                </div>
            </div>
            <div class="text-center pt-4">
                <span class="block text-slate-500 text-[9px] uppercase">Tiempo Empleado</span>
                <span id="mdl-time" class="text-gold font-mono">00:00:00</span>
            </div>
        </div>

        <button onclick="cerrarModalReporte()" class="w-full py-4 rounded-2xl bg-gold text-slate-950 font-bold hover:scale-[1.02] active:scale-95 transition-all duration-200 shadow-lg shadow-gold/20">
           FINALIZAR
        </button>
    </div>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://www.rgraph.net/libraries/RGraph.common.core.js"></script>
<script src="https://www.rgraph.net/libraries/RGraph.gauge.js"></script>

<script src="assets/js/main.js"></script>
<script src="assets/js/jsStock.js"></script>
