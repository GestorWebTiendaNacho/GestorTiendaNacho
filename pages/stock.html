<link rel="stylesheet" href="assets/css/cssStock.css">

<div class="main-admin-container">
    
    <header class="admin-header">
        <h1>ADMINISTRACIÓN N.I.C.O.</h1>
    </header>

    <div class="container-box">
        
        <div class="center-core" id="core-trigger">
            <span>Administración</span>
        </div>
        
        <div class="box box-1">
            <div class="cover">
                <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-893bc9989a52eba0.png" alt="Sync">
            </div>
            <button onclick="abrirModalSincronizacion()">
                <div>Sincronizar STOCK</div>
            </button>
        </div>

        <div class="box box-2">
            <div class="cover">
                <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-964edcf0f07211b0.png" alt="Rescue">
            </div>
            <button onclick="window.ejecutarProtocoloRescate()">
                <div>Rescatar Base</div>
            </button>
        </div>

        <div class="box box-3">
            <div class="cover">
                <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-2ebb2b6f93add843.png" alt="Stock">
            </div>
            <button onclick="crearBackupCSV()">
                <div>Stock Masivo</div>
            </button>
        </div>

        <div class="box box-4">
            <div class="cover">
                <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/945546/3433202-f79c4cc8de2f84ae.png" alt="Settings">
            </div>
            <button onclick="abrirModalConfiguracion()">
                <div>Actualizar VENTAS</div>
            </button>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://www.rgraph.net/libraries/RGraph.common.core.js"></script>
<script src="https://www.rgraph.net/libraries/RGraph.gauge.js"></script>
<script src="assets/js/main.js"></script>
<script src="assets/js/jsStock.js"></script>
